server:
  port: 8080
spring:
  application:
    name: "ms-immobilie"
  devtools:
    add-properties: false
  profiles:
    include: null
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"

adapters:
  postgresql:
    host: localhost
    port: 5432
    database: ms_immobilie
    schema: public
    username: postgres
    password: postgres

springdoc:
  use-fn-handler-mapping: true
  packages-to-scan: co.com.bancolombia
